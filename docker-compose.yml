version: "3.9"

services:
  
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  
  backend:
    build:
      context: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 1
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  
  celery:
    build:
      context: ./backend
    command: celery -A config worker --loglevel=info --concurrency=1
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - backend
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "3"
